experiments:

  batch_baseline:

    run: true

    model:
      name: batch_new_filter_size_32_64_bottleneck_baseline
      params:
        num_classes: 37

    optimizer:
      name: adam
      weight_decay: 1e-4
      lr: 0.001

    scheduler:
      run: true
      name: cosine
      T_max: 100

    transforms:
      train:
        - random_rotation:
            degrees: 15
        - color_jitter:
            brightness: 0.2
            contrast: 0.2
            saturation: 0.2
        - random_erasing:
            p: 0.15
      val: []

    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

    callbacks:
      - metric_logger
      - gradients_logger
      - weight_update_logger
      - filter_activity_logger
      - lr_logger

    batch_size: 32
    epochs: 50
    log_dir: runs/exp_015_on_012_bacth_new_version_32_64_bottleneck_filter